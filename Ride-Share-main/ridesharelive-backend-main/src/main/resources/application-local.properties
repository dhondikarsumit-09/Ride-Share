spring.datasource.url=jdbc:h2:mem:rideshare;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.mail.otp.enabled=true
app.mail.otp.skip-if-no-smtp-host=true
app.auth.signup-otp.expose-dev-otp=true
